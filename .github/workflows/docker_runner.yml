---
name: BuildDockerRunner

permissions:
  contents: write

# 触发条件
on:
  workflow_dispatch:
  push:
    paths:
      - 'docker_runner/**'

jobs:
  docker-runner:
    # 运行环境
    runs-on: ubuntu-latest
    # 运行步骤
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'
      - uses: actions/checkout@v4
        with:
          path: main

      - uses: actions/checkout@v4
        with:
          ref: release
          path: release

      - run: go install github.com/mitchellh/gox@latest # 安装 gox
      - name: Build
        run: |
          mkdir -p ./main/exe
          cd ./main/docker_runner
          make build-linux-amd64
          cd ../..
          mv -uf ./main/exe/** ./release/exe
          rm -rf ./main/exe

      - name: Commit Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ./release
          git config --global user.email "ximplez@foxmail.com"
          git config --global user.name "ximplez"
          git pull
          git add .
          git pull
          git commit -m "build docker runner"
          git pull
          git push
