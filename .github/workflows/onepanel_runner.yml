---
name: BuildOnePanelRunner

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    paths:
      - 'onepanel_runner/**'

jobs:
  onepanel-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'

      - uses: actions/checkout@v4
        with:
          path: main

      - uses: actions/checkout@v4
        with:
          ref: release
          path: release

      - run: go install github.com/mitchellh/gox@latest

      - name: Build
        run: |
          mkdir -p ./main/exe
          cd ./main/onepanel_runner
          make build-linux-amd64
          cd ../..
          cp -r ./main/exe/** ./release/exe
          rm -rf ./main/exe

      - name: Commit Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ./release
          git config --global user.email "ximplez@foxmail.com"
          git config --global user.name "ximplez"
          git pull
          git add .
          git pull
          git commit -m "build onepanel runner"
          git pull
          git push
