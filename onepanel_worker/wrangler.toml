name = "onepanel-worker"
main = "src/index.js"
compatibility_date = "2026-07-21"
compatibility_flags = ["nodejs_compat"]
# Cloudflare Git builds must preserve existing dashboard secret bindings.
keep_vars = true

[vars]
TZ = "Asia/Shanghai"

[observability]
enabled = true

[[services]]
binding = "FEISHU_BOT_GATEWAY"
service = "feishu-bot-gateway"

[triggers]
crons = ["*/30 * * * *"]
