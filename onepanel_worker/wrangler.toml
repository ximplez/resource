name = "onepanel-worker"
main = "src/index.js"
compatibility_date = "2026-07-21"
compatibility_flags = ["nodejs_compat"]

[vars]
TZ = "Asia/Shanghai"

[secrets]
required = [
  "API_AUTH_TOKEN",
  "ONEPANEL_CONFIG_JSON",
]

[observability]
enabled = true

[[services]]
binding = "FEISHU_BOT_GATEWAY"
service = "feishu-bot-gateway"

[triggers]
crons = ["*/30 * * * *"]
